name: Deploy Zepp Sync to Oracle VM

on:
  push:
    branches: [ "main" ]
    paths:
      - 'oracle-server-sync/**'
      - '.github/workflows/deploy.yml'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./oracle-server-sync
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          if [ -f requirements-bq.txt ]; then pip install -r requirements-bq.txt; fi

      - name: Lint with flake8
        working-directory: ./oracle-server-sync
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  deploy:
    needs: lint-and-test
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to Oracle VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USERNAME }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            # 1. Install Docker and Git if they don't exist on the Oracle VM
            if ! command -v docker &> /dev/null; then
              sudo apt-get update -y
              sudo apt-get install -y docker.io docker-compose-v2 git
            fi
            
            # 2. Clone the repository if it doesn't exist
            if [ ! -d "~/ZeppOs-MinProgram" ]; then
              cd ~
              git clone https://github.com/sai7teja/ZeppOs-MinProgram.git
            fi
            
            # 3. Navigate to the project directory
            cd ~/ZeppOs-MinProgram/oracle-server-sync
            
            # 4. Pull the latest changes from GitHub
            git pull origin main
            
            # 5. Inject the GCP Service Account Key securely from GitHub Secrets
            echo '${{ secrets.GCP_SA_KEY_JSON }}' > gcp-sa-key.json
            
            # 6. Inject the Project Configuration (Non-sensitive routing vars)
            echo 'ZEPP_EMAIL=saiteja.wipro@gmail.com' > .env
            echo 'GCP_PROJECT_ID=lazybot7' >> .env
            echo 'GCP_SECRET_NAME=zepp-password' >> .env
            echo 'BQ_DATASET=zepp_health_data' >> .env
            
            # 6. Inject Grafana Cloud Credentials for the Alloy Monitoring Agent
            echo 'GRAFANA_PROMETHEUS_URL=${{ secrets.GRAFANA_PROMETHEUS_URL }}' >> .env
            echo 'GRAFANA_PROMETHEUS_USER=${{ secrets.GRAFANA_PROMETHEUS_USER }}' >> .env
            echo 'GRAFANA_LOKI_URL=${{ secrets.GRAFANA_LOKI_URL }}' >> .env
            echo 'GRAFANA_LOKI_USER=${{ secrets.GRAFANA_LOKI_USER }}' >> .env
            echo 'GRAFANA_CLOUD_API_KEY=${{ secrets.GRAFANA_CLOUD_API_KEY }}' >> .env
            
            # 7. Prevent Docker from creating the cache file as a directory
            if [ -d ".zepp_token_cache.json" ]; then
              sudo rm -rf .zepp_token_cache.json
            fi
            touch .zepp_token_cache.json
            
            # 8. Rebuild the Docker image and restart the daemon silently using sudo
            sudo docker compose --env-file .env build
            sudo docker compose --env-file .env up -d
            
            # 9. Clean up old unused images to save space
            sudo docker image prune -f
